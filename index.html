         background-color: transparent;                                 ">

                    style="font-size:16px; text-align:left; font-family:Helvetica, sans-serif; color:#661d1d; background-color:#ffeded; border-radius:3px; border-color:#ff4949;max-width:540px;">
                    <div class="sib-form-message-panel__text sib-form-message-panel__text--center">
                        <svg viewBox="0 0 512 512" class="sib-icon sib-notification__icon">
                            <path

                </div>

                        <svg viewBox="0 0 512 512" class="sib-icon sib-notification__icon">

                                style="font-size:32px; text-align:left; font-weight:700; font-family:Helvetica, sans-serif; color:#212529; background-color:transparent; text-align:left">
                                <p>Get notified when we open</p>
                            </div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="sib-form-block"

                                <div class="sib-text-form-block">
                                    <p>Subscribe to our mailing list and stay updated</p>
                                </div>
                            </div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="sib-input sib-form-block">
                                <div class="form__entry entry_block">
                                    <div class="form__label-row ">
                                        <label class="entry__label"
                                            style="font-weight: 700; text-align:left; font-size:16px; text-align:left; font-weight:700; font-family:Helvetica, sans-serif; color:#3c4858;"

                                        </div>
                                    </div>

                                    <label class="entry__error entry__error--primary"
                                        style="font-size:16px; text-align:left; font-family:Helvetica, sans-serif; color:#661d1d; background-color:#ffeded; border-radius:3px; border-color:#ff4949;">
                                    </label>
                                    <label class="entry__specification"
                                        style="font-size:12px; text-align:left; font-family:Helvetica, sans-serif; color:#8390A4; text-align:left">
                                        Provide your email address to subscribe. For e.g abc@xyz.com
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="sib-optin sib-form-block" data-required="true">
                                <div class="form__entry entry_mcq">
                                    <div class="form__label-row ">
                                        <label class="entry__label"
                                            style="font-weight: 700; text-align:left; font-size:16px; text-align:left; font-weight:700; font-family:Helvetica, sans-serif; color:#3c4858;"
                                            for="OPT_IN" data-required="*">Opt-in</label>
                                        <div class="entry__choice" style="">
                                            <label>
                                                <input type="checkbox" class="input_replaced" value="1" id="OPT_IN"
                                                    name="OPT_IN" required />
                                                <span class="checkbox checkbox_tick_positive"
                                                    style="margin-left:"></span><span
                                                    style="font-size:14px; text-align:left; font-family:Helvetica, sans-serif; color:#212529; background-color:transparent;">
                                                    <p>I agree to receive your emails and accept the data privacy
                                                        statement.</p>
                                                </span> </label>
                                        </div>
                                    </div>
                                    <label class="entry__error entry__error--primary"
                                        style="font-size:16px; text-align:left; font-family:Helvetica, sans-serif; color:#661d1d; background-color:#ffeded; border-radius:3px; border-color:#ff4949;">
                                    </label>
                                    <label class="entry__specification"
                                        style="font-size:12px; text-align:left; font-family:Helvetica, sans-serif; color:#8390A4; text-align:left">
                                        You may unsubscribe at any time using the link in our newsletter.
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="sib-captcha sib-form-block">
                                <div class="form__entry entry_block">
                                    <div class="form__label-row ">
                                        <script>
                                            function handleCaptchaResponse() {
                                                var event = new Event('captchaChange');
                                                document.getElementById('sib-captcha').dispatchEvent(event);
                                            }
                                        </script>
                                        <div class="g-recaptcha sib-visible-recaptcha" id="sib-captcha"
                                            data-sitekey="6Ld5t1YsAAAAAGUzrGfnzBpzdrTNPM7vXNlXNwdS"
                                            data-callback="handleCaptchaResponse" style="direction:ltr"></div>
                                    </div>
                                    <label class="entry__error entry__error--primary"
                                        style="font-size:16px; text-align:left; font-family:Helvetica, sans-serif; color:#661d1d; background-color:#ffeded; border-radius:3px; border-color:#ff4949;">
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div style="padding: 8px 0;">
                            <div class="sib-form-block" style="text-align: center">
                                <button class="sib-form-block__button sib-form-block__button-with-loader"

                                        <path

                                    </svg>
                                    Subscribe
                                </button>
                            </div>
                        </div>

                        <input type="text" name="email_address_check" value="" class="input--hidden">
