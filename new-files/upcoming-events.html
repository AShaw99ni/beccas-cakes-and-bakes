<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upcoming Events | Becca's Cakes and Bakes</title>
    <link rel="icon" type="image/png" href="./img/Logo circle.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="upcoming-events.css">
</head>

<body class="text-dark" data-page="upcoming-events">

    <!-- ── Navbar (injected by components.js) ── -->
    <div id="site-nav"></div>

    <!-- ── Page Hero ── -->
    <div class="page-hero">
        <div class="page-hero__content">
            <span class="hero-subtitle">What's coming up</span>
            <div class="hero-divider"></div>
            <h1>Upcoming Events</h1>
            <p class="hero-body">
                Find Becca at a market stall near you, catch a special order window,
                or tune in for a TikTok live.
            </p>
        </div>
    </div>

    <!-- ── Events body ── -->
    <div class="events-page">
        <div class="container events-container">

            <!-- Type legend -->
            <div class="event-legend">
                <div class="legend-item">
                    <div class="legend-stripe legend-stripe--stall"></div>
                    <span>Market Stall</span>
                </div>
                <div class="legend-item">
                    <div class="legend-stripe legend-stripe--order"></div>
                    <span>Special Orders</span>
                </div>
                <div class="legend-item">
                    <div class="legend-stripe legend-stripe--tiktok"></div>
                    <span>TikTok Live</span>
                </div>
            </div>

            <!-- Filter tabs -->
            <div class="filter-tabs" id="filterTabs">
                <button class="filter-btn active" data-type="all">
                    <span class="dot dot--all"></span> All Events
                </button>
                <button class="filter-btn" data-type="stall">
                    <span class="dot dot--stall"></span> Market Stalls
                </button>
                <button class="filter-btn" data-type="order">
                    <span class="dot dot--order"></span> Special Orders
                </button>
                <button class="filter-btn" data-type="tiktok">
                    <span class="dot dot--tiktok"></span> TikTok Lives
                </button>
            </div>

            <!-- Event list (populated by JS) -->
            <div id="eventList"></div>
            <div class="no-events" id="noEvents">No events to show — check back soon!</div>

        </div>
    </div>

    <!-- ── Footer (injected by components.js) ── -->
    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./components.js"></script>

    <script>
        /* ── EVENT DATA ────────────────────────────────────────────────────────
           Add, remove or edit events here.
           Fields:
             date     "YYYY-MM-DD"
             type     "stall" | "order" | "tiktok"
             title    event name
             time     e.g. "10:00am – 3:00pm"  (optional)
             location venue / platform          (optional)
             note     extra info                (optional)
        ─────────────────────────────────────────────────────────────────────── */
        const events = [
            { date: "2026-03-07", type: "order",  title: "Mother's Day Special Orders Open",  time: "Opens midnight",  note: "Limited slots — order early to avoid disappointment. DM on Instagram to reserve." },
            { date: "2026-03-08", type: "tiktok", title: "TikTok Live — Baking Q&A",          time: "7:00pm",          location: "@beccascakesandbakes.ni", note: "Come chat, ask questions, and watch a batch of brownies being made live." },
            { date: "2026-03-15", type: "stall",  title: "Belfast Farmers' Market",           time: "9:00am – 2:00pm", location: "St. George's Market, Belfast", note: "Full range available including weekend specials. Cash and card accepted." },
            { date: "2026-03-21", type: "order",  title: "Mother's Day Order Deadline",       time: "11:59pm",         note: "Last chance to place a Mother's Day order for guaranteed delivery by 22 March." },
            { date: "2026-03-28", type: "stall",  title: "Lisburn Spring Market",             time: "10:00am – 4:00pm",location: "Lisburn Market Square",        note: "Easter bakes will be available — hot cross bun traybakes and simnel-inspired slices." },
            { date: "2026-03-29", type: "tiktok", title: "TikTok Live — Easter Baking",       time: "6:30pm",          location: "@beccascakesandbakes.ni" },
            { date: "2026-04-04", type: "stall",  title: "Belfast Farmers' Market",           time: "9:00am – 2:00pm", location: "St. George's Market, Belfast" },
            { date: "2026-04-10", type: "order",  title: "Easter Special Orders Open",        time: "Opens 9:00am",    note: "Easter gifting boxes available this year. Limited to 20 orders." },
            { date: "2026-04-16", type: "order",  title: "Easter Order Deadline",             time: "11:59pm",         note: "Orders must be placed by midnight for collection/delivery before Easter weekend." },
            { date: "2026-04-19", type: "tiktok", title: "TikTok Live — Easter Special",      time: "5:00pm",          location: "@beccascakesandbakes.ni" },
            { date: "2026-05-02", type: "stall",  title: "Belfast Farmers' Market",           time: "9:00am – 2:00pm", location: "St. George's Market, Belfast" },
            { date: "2026-05-16", type: "stall",  title: "Hillsborough Artisan Market",       time: "10:00am – 3:00pm",location: "Hillsborough Village Square",  note: "First time at this market — come and say hello!" },
            { date: "2026-05-22", type: "tiktok", title: "TikTok Live — New Summer Menu",     time: "7:00pm",          location: "@beccascakesandbakes.ni",     note: "Sneak peek at the new summer range before it launches." },
        ];

        /* ── Helpers ──────────────────────────────────────────────────────── */
        const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const TYPE_LABELS = { stall: 'Market Stall', order: 'Special Orders', tiktok: 'TikTok Live' };
        const TYPE_ICONS  = { stall: 'fas fa-map-marker-alt', order: 'fas fa-shopping-bag', tiktok: 'fab fa-tiktok' };

        function parseDate(str) {
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        /* ── Build a single event card ────────────────────────────────────── */
        function buildCard(ev) {
            const d    = parseDate(ev.date);
            const past = d < new Date(new Date().setHours(0, 0, 0, 0));

            const metaParts = [
                ev.time     ? `<span><i class="far fa-clock"></i> ${ev.time}</span>`                 : '',
                ev.location ? `<span><i class="fas fa-map-marker-alt"></i> ${ev.location}</span>` : '',
            ].filter(Boolean).join('');

            return `
                <div class="event-card type-${ev.type}${past ? ' past' : ''}" data-type="${ev.type}">
                    <div class="event-date-block">
                        <div class="event-date-block__day">${d.getDate()}</div>
                        <div class="event-date-block__weekday">${DAYS[d.getDay()]}</div>
                    </div>
                    <div class="event-info">
                        <div class="event-type-badge">
                            <span class="badge-dot"></span>
                            <i class="${TYPE_ICONS[ev.type]}"></i>
                            ${TYPE_LABELS[ev.type]}
                        </div>
                        <div class="event-title">${ev.title}</div>
                        ${metaParts ? `<div class="event-meta">${metaParts}</div>` : ''}
                        ${ev.note   ? `<div class="event-note">${ev.note}</div>`   : ''}
                    </div>
                </div>`;
        }

        /* ── Render grouped by month ──────────────────────────────────────── */
        function render(typeFilter) {
            const list     = document.getElementById('eventList');
            const noEvents = document.getElementById('noEvents');

            const filtered = events
                .filter(ev => typeFilter === 'all' || ev.type === typeFilter)
                .sort((a, b) => parseDate(a.date) - parseDate(b.date));

            if (!filtered.length) {
                list.innerHTML = '';
                noEvents.style.display = 'block';
                return;
            }
            noEvents.style.display = 'none';

            const groups = {};
            filtered.forEach(ev => {
                const d   = parseDate(ev.date);
                const key = `${d.getFullYear()}-${d.getMonth()}`;
                if (!groups[key]) groups[key] = { label: `${MONTHS[d.getMonth()]} ${d.getFullYear()}`, evs: [] };
                groups[key].evs.push(ev);
            });

            list.innerHTML = Object.values(groups).map(g => `
                <div class="month-group">
                    <div class="month-heading">
                        ${g.label}
                        <span class="month-count">${g.evs.length} event${g.evs.length !== 1 ? 's' : ''}</span>
                    </div>
                    ${g.evs.map(buildCard).join('')}
                </div>`).join('');
        }

        /* ── Filter tabs ──────────────────────────────────────────────────── */
        document.getElementById('filterTabs').addEventListener('click', e => {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(btn.dataset.type);
        });

        render('all');
    </script>
</body>
</html>
